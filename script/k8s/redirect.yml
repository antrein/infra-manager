apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: <project_id>
data:
  default.conf.template: |
    server {
        listen 80;
        server_name ${HOST};

        location / {
            proxy_pass ${TARGET_SERVICE};
            proxy_set_header Host ${TARGET_HOST};
            proxy_redirect off;
            proxy_ssl_server_name on;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: <project_id>-reverse-proxy
  namespace: <project_id>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: <project_id>-reverse-proxy
  template:
    metadata:
      labels:
        app: <project_id>-reverse-proxy
    spec:
      initContainers:
      - name: init-nginx-config
        image: busybox
        command: ['/bin/sh', '-c']
        args:
        - |
          mkdir -p /etc/nginx/conf.d && \
          sed -e 's|${HOST}|<project_id>-redirect.aegis.antrein.com|g' \
              -e 's|${TARGET_SERVICE}|https://<project_domain>/|g' \
              -e 's|${TARGET_HOST}|<project_domain>|g' \
              /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf
        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/templates
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: config-volume
        configMap:
          name: nginx-config
      - name: nginx-conf
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: <project_id>-reverse-proxy
  namespace: <project_id>
spec:
  selector:
    app: <project_id>-reverse-proxy
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    kubernetes.io/ingress.allow-http: "true"
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/proxy-body-size: 3M
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Access-Control-Allow-Origin: $http_origin";
      # add_header Access-Control-Allow-Origin $http_origin;
      add_header Access-Control-Allow-Methods "PUT,POST, GET, OPTIONS, PATCH";
      more_set_headers "Access-Control-Allow-Credentials: true";
      more_set_headers "Access-Control-Expose-Headers: *";
      add_header Access-Control-Allow-Headers "DNT,X-CustomHeader,X-LANG,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,X-Api-Key,X-Device-Id,Access-Control-Allow-Origin,econolab-uid-authorization,authorization,authorization-v2,api-key,base-url,method,path";    
  name: <project_id>-reverse-proxy
  namespace: <project_id>
spec:
  ingressClassName: nginx
  rules:
  rules:
  - host: <project_id>-redirect.aegis.antrein.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: <project_id>-reverse-proxy
            port:
              number: 80
  tls:
  - hosts:
    - <project_id>-redirect.aegis.antrein.com
    secretName: <project_id>-reverse-proxy-tls